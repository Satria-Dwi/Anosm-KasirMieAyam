<body>
    <div class="container">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <img src="../../images/logo.png" alt="logo">
            <!-- <h2>ANOMS</h2> -->
            <button onclick="bukaHome()">🏠 Home</button>
            <button class="active">🍽️ Kasir</button>
            <button id="menu-admin" onclick="bukaHistory()">📊 History Transaction</button>
            <button onclick="logout()">Logout</button>
        </div>

        <!-- MENU -->
        <div class="main">
            <div class="topbar">
                <input type="text" id="search" placeholder="Cari menu..." onkeyup="searchMenu()">
            </div>
            <!-- <button onclick="filter('all')">🍽️ All</button>
            <button onclick="filter('mie')">🍜 Mie</button>
            <button onclick="filter('minum')">🥤 Minum</button> -->
            <div class="grid" id="menu-list"></div>
        </div>

        <!-- CART -->
        <div class="cart">
            <h2>🧾 Order</h2>
            <div id="cart-list"></div>

            <div class="summary">
                <p>Subtotal: Rp <span id="subtotal">0</span></p>
                <p>Pajak (10%): Rp <span id="tax">0</span></p>
                <p>Total: Rp <span id="total">0</span></p>

                <!-- <input type="number" id="bayar" placeholder="Uang Bayar"> -->
                <input type="text" id="bayar" placeholder="Masukkan uang bayar">
                <input type="text" id="noMeja" placeholder="No Meja / Nama Meja">
                <p>Kembalian: Rp <span id="kembali">0</span></p>
                <button onclick="prosesBayar()">💳 Bayar Sekarang</button>
                <button onclick="pilihPrinter()">Pilih Printer</button>
            </div>
        </div>

    </div>

    <div id="strukModal" class="struk-modal">
        <div class="struk-box">
            <div id="struk">
                <h3>MIE AYAM OM PANGSIT</h3>
                <p id="s-no"></p>
                <p id="s-noMeja"></p>
                <p id="s-tanggal"></p>
                <hr>
                <div id="s-list"></div>
                <hr>
                <p>Total: <span id="s-total"></span></p>
                <p>Bayar: <span id="s-bayar"></span></p>
                <p>Kembali: <span id="s-kembali"></span></p>
            </div>

            <button onclick="document.getElementById('strukModal').style.display='none'">
                Tutup
            </button>
