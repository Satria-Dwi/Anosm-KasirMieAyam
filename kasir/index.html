<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Kasir PRO</title>
    <link rel="stylesheet" href="../style/style.css">
</head>

<body>
    <div class="container">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <img src="../img/logo.png" alt="logo">
            <!-- <h2>ANOMS</h2> -->
            <button onclick="bukaHome()">🏠 Home</button>
            <button class="active">🍽️ Kasir</button>
            <button onclick="bukaHistory()">📊 History Transaction</button>
        </div>

        <!-- MENU -->
        <div class="main">
            <div class="topbar">
                <input type="text" id="search" placeholder="Cari menu..." onkeyup="searchMenu()">
            </div>
            <!-- <button onclick="filter('all')">🍽️ All</button>
            <button onclick="filter('mie')">🍜 Mie</button>
            <button onclick="filter('minum')">🥤 Minum</button> -->
            <div class="grid" id="menu-list"></div>
        </div>

        <!-- CART -->
        <div class="cart">
            <h2>🧾 Order</h2>
            <div id="cart-list"></div>

            <div class="summary">
                <p>Subtotal: Rp <span id="subtotal">0</span></p>
                <p>Pajak (10%): Rp <span id="tax">0</span></p>
                <p>Total: Rp <span id="total">0</span></p>

                <!-- <input type="number" id="bayar" placeholder="Uang Bayar"> -->
                <input type="number" id="bayar" placeholder="Masukkan uang bayar">
                <p>Kembalian: Rp <span id="kembali">0</span></p>

                <button onclick="prosesBayar()">💳 Bayar Sekarang</button>
            </div>
        </div>

    </div>

    <!-- STRUK -->
    <div id="struk" class="struk">
        <h3>WARUNG MIE AYAM</h3>
        <p>Jl. Contoh No.1</p>
        <p>No: <span id="s-no"></span></p>
        <p>Tanggal: <span id="s-tanggal"></span></p>
        <hr>

        <div id="s-list"></div>

        <hr>
        <p>Total : Rp <span id="s-total"></span></p>
        <p>Bayar : Rp <span id="s-bayar"></span></p>
        <p>Kembali : Rp <span id="s-kembali"></span></p>

        <hr>
        <p style="text-align:center">Terima Kasih 🙏</p>
    </div>

    <script src="../script/script.js"></script>
</body>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB-vWhdcOYRayZ8YHACJ-fvzpci0eWKRGQ",
        authDomain: "anos-kasirmieayam.firebaseapp.com",
        projectId: "anos-kasirmieayam",
        storageBucket: "anos-kasirmieayam.firebasestorage.app",
        messagingSenderId: "561871364968",
        appId: "1:561871364968:web:170152a933d38787796cdd",
        measurementId: "G-SLNRZFD32Y"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 🔥 fungsi global
    window.simpanTransaksi = async function (data) {
        console.log("🔥 kirim:", data);

        try {
            await addDoc(collection(db, "transaksi"), data);
            console.log("✅ MASUK FIREBASE");
        } catch (e) {
            console.error("❌ ERROR:", e);
        }
    };

    // 🔥 WAJIB GLOBAL
    window.db = db;
    window.addDoc = addDoc;
    window.collection = collection;
</script>

</html>
