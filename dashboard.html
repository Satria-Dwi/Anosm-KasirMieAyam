<!DOCTYPE html>
<html>

<head>
    <title>Dashboard Transaksi</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f6fa;
            margin: 0;
            padding: 20px;
        }

        h2 {
            margin-bottom: 10px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .total {
            font-size: 24px;
            font-weight: bold;
            color: #27ae60;
        }

        .filter {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input,
        button {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background: #3498db;
            color: white;
            border: none;
            cursor: pointer;
        }

        .item {
            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }

        .tanggal {
            font-size: 12px;
            color: gray;
        }
    </style>
</head>

<body>

    <h2>📊 Dashboard Transaksi</h2>

    <div class="card">
        <div>Total Pemasukan</div>
        <div class="total">Rp <span id="total">0</span></div>
    </div>

    <div class="card filter">
        <input type="date" id="start">
        <input type="date" id="end">
        <button onclick="filterTanggal()">Filter</button>
    </div>

    <div class="card" id="list"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB-vWhdcOYRayZ8YHACJ-fvzpci0eWKRGQ",
            authDomain: "anos-kasirmieayam.firebaseapp.com",
            projectId: "anos-kasirmieayam",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let semuaData = [];

        // 🔥 REALTIME LISTENER
        function loadData() {
            try {
                onSnapshot(collection(db, "transaksi"), (snapshot) => {

                    let dataBaru = [];

                    snapshot.forEach((doc) => {
                        let data = doc.data();
                        dataBaru.push(data);
                    });

                    // 🔔 DETEKSI DATA BARU
                    if (dataBaru.length > semuaData.length) {
                        console.log("🔥 Transaksi baru masuk!");
                    }

                    semuaData = dataBaru;

                    renderData(semuaData);
                });

            } catch (error) {
                console.error("🔥 ERROR:", error);
                document.getElementById("list").innerHTML = "❌ Error ambil data";
            }
        }

        // render data
        function renderData(dataList) {
            let html = "";
            let totalAll = 0;

            dataList.forEach(data => {
                let total = parseInt(data.total) || 0;
                totalAll += total;

                let items = "";

                if (data.items) {
                    data.items.forEach(i => {
                        items += `<li>${i.nama} x${i.qty}</li>`;
                    });
                }

                html += `
        <div class="item">
            <b>Rp ${total.toLocaleString("id-ID")}</b><br>
            <span class="tanggal">
                ${data.tanggal ? new Date(data.tanggal).toLocaleString("id-ID") : "-"}
            </span>
            <ul>${items}</ul>
        </div>
        `;
            });

            document.getElementById("list").innerHTML = html || "Tidak ada data";
            document.getElementById("total").innerText = totalAll.toLocaleString("id-ID");
        }

        // filter tanggal
        window.filterTanggal = function () {
            let start = document.getElementById("start").value;
            let end = document.getElementById("end").value;

            if (!start || !end) {
                alert("Isi tanggal dulu!");
                return;
            }

            let startDate = new Date(start);
            let endDate = new Date(end);
            endDate.setHours(23, 59, 59);

            let filtered = semuaData.filter(d => {
                let tgl = new Date(d.tanggal);
                return tgl >= startDate && tgl <= endDate;
            });

            renderData(filtered);
        };

        loadData();
    </script>

</body>

</html>
